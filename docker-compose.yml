# version: "3.8"

# ============================================================
# NETWORKS
# ============================================================
# On crée un réseau interne "kafka-net" pour que les containers
# puissent se parler entre eux par leur nom (ex: "zookeeper", "kafka")
# sans exposer ces communications à l'extérieur.
networks:
  kafka-net:
    driver: bridge


services:

  # ----------------------------------------------------------
  # ZOOKEEPER
  # Kafka a besoin de Zookeeper pour gérer son état interne :
  # - Qui est le leader parmi les brokers ?
  # - Quels topics existent ?
  # - Quels consumers sont connectés ?
  # C'est le "registre central" de Kafka.
  # Note : Kafka 3.x+ peut fonctionner sans Zookeeper (KRaft mode)
  # mais on utilise le mode classique ici pour la clarté.
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - kafka-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      # Intervalle de temps (en ms) entre chaque "tick" interne
      # Un tick = unité de base pour les timeouts et heartbeats
      ZOOKEEPER_TICK_TIME: 2000

  # ----------------------------------------------------------
  # KAFKA BROKER
  # C'est le coeur du système. Le broker :
  # - Reçoit les messages des producers
  # - Les stocke dans des topics (partitionnés)
  # - Les distribue aux consumers
  # ----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - kafka-net
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # LISTENERS : où Kafka écoute les connexions (en interne et externe)
      # PLAINTEXT       → pour les autres containers (producer, consumer)
      # PLAINTEXT_HOST  → pour ta machine locale (ton code Python hors Docker)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092

      # ADVERTISED_LISTENERS : adresses que Kafka annonce aux clients
      # pour qu'ils sachent comment le rejoindre
      # kafka:29092       → adresse interne (entre containers)
      # localhost:9092    → adresse externe (ta machine)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092

      # Mapping des noms de protocoles vers les vrais protocoles
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # On a 1 seul broker → replication factor max = 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      # Même chose pour le topic interne de transactions
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Création automatique des topics si ils n'existent pas
      # Pratique en dev, à désactiver en prod
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ----------------------------------------------------------
  # KAFDROP
  # Interface web pour visualiser Kafka :
  # - Liste des topics
  # - Messages dans chaque topic
  # - Consumers connectés
  # → Accessible sur http://localhost:9000
  # C'est ton "dashboard de debug" pendant le développement
  # ----------------------------------------------------------
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    networks:
      - kafka-net
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      # Adresse du broker Kafka — on utilise le nom interne "kafka:29092"
      # car Kafdrop est dans le même réseau Docker
      KAFKA_BROKERCONNECT: kafka:29092
      # Options JVM (Java Virtual Machine) pour limiter la RAM utilisée
      JVM_OPTS: "-Xms32M -Xmx64M"
